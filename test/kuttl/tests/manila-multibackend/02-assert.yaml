#
# Check for:
#
# - 1 Manila
# - 2 Manila share-0
# - 3 Manila share-1

apiVersion: manila.openstack.org/v1beta1
kind: Manila
metadata:
   name: manila
status:
   conditions:
      - message: Setup complete
        reason: Ready
        status: "True"
        type: Ready
      - message: CronJob completed
        reason: Ready
        status: "True"
        type: CronJobReady
      - message: DB create completed
        reason: Ready
        status: "True"
        type: DBReady
      - message: DBsync completed
        reason: Ready
        status: "True"
        type: DBSyncReady
      - message: Input data complete
        reason: Ready
        status: "True"
        type: InputReady
      - message: Setup complete
        reason: Ready
        status: "True"
        type: ManilaAPIReady
      - message: Setup complete
        reason: Ready
        status: "True"
        type: ManilaSchedulerReady
      - message: Deployment completed
        reason: Ready
        status: "True"
        type: ManilaShareReady
      - message: MariaDBAccount creation complete
        reason: Ready
        status: "True"
        type: MariaDBAccountReady
      - message: " Memcached instance has been provisioned"
        reason: Ready
        status: "True"
        type: MemcachedReady
      - message: NetworkAttachments completed
        reason: Ready
        status: "True"
        type: NetworkAttachmentsReady
      - message: RabbitMqTransportURL successfully created
        reason: Ready
        status: "True"
        type: RabbitMqTransportURLReady
      - message: RoleBinding created
        reason: Ready
        status: "True"
        type: RoleBindingReady
      - message: Role created
        reason: Ready
        status: "True"
        type: RoleReady
      - message: ServiceAccount created
        reason: Ready
        status: "True"
        type: ServiceAccountReady
      - message: Service config create completed
        reason: Ready
        status: "True"
        type: ServiceConfigReady
   manilaAPIReadyCount: 1
   manilaSchedulerReadyCount: 1
   manilaSharesReadyCounts:
      share0: 1
      share1: 1
   transportURLSecret: rabbitmq-transport-url-manila-manila-transport
---
apiVersion: manila.openstack.org/v1beta1
kind: ManilaShare
metadata:
  name: manila-share-share0
status:
  conditions:
  - message: Setup complete
    reason: Ready
    status: "True"
    type: Ready
  - message: Deployment completed
    reason: Ready
    status: "True"
    type: DeploymentReady
  - message: Input data complete
    reason: Ready
    status: "True"
    type: InputReady
  - message: NetworkAttachments completed
    reason: Ready
    status: "True"
    type: NetworkAttachmentsReady
  - message: Service config create completed
    reason: Ready
    status: "True"
    type: ServiceConfigReady
  - message: Input data complete
    reason: Ready
    status: "True"
    type: TLSInputReady
  readyCount: 1
---
apiVersion: manila.openstack.org/v1beta1
kind: ManilaShare
metadata:
  name: manila-share-share1
status:
  conditions:
  - message: Setup complete
    reason: Ready
    status: "True"
    type: Ready
  - message: Deployment completed
    reason: Ready
    status: "True"
    type: DeploymentReady
  - message: Input data complete
    reason: Ready
    status: "True"
    type: InputReady
  - message: NetworkAttachments completed
    reason: Ready
    status: "True"
    type: NetworkAttachmentsReady
  - message: Service config create completed
    reason: Ready
    status: "True"
    type: ServiceConfigReady
  - message: Input data complete
    reason: Ready
    status: "True"
    type: TLSInputReady
  readyCount: 1
